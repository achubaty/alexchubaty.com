bio: |
  Dr. Chubaty is an ecologist, simulation modeller, and co-developer of the
  open source `SpaDES` simulation platform. He completed his PhD at Simon
  Fraser University modelling host selection in mountain pine beetle (MPB),
  and postdoctoral research at Université Laval and Natural Resources Canada
  developing forecasting models of MPB spread.

  He currently operates FOR-CAST Research & Analytics in Calgary, Canada,
  which supports the development and integration of models simulating forest
  vegetation dynamics, wildfire, insect disturbance, and wildlife populations
  to inform decision making for land management and species at risk. He is an
  advocate for open source, open data, and reproducible workflows.

