# HugoBlox configuration — schema v2
# Docs: https://docs.hugoblox.com/
hugoblox:
  schema: "2.0"

  identity:
    name: "Alex M. Chubaty"
    organization: "FOR-CAST Research & Analytics"
    type: person
    tagline: "Ecologist and simulation modeller"
    description: "Personal website of Dr. Alex M. Chubaty — ecologist, simulation modeller, and co-developer of the SpaDES platform."
    social:
      twitter: ""

  theme:
    mode: system
    pack: "default"
    colors:
      primary: "#2962ff"
      secondary: ""
      neutral: ""
    colors_light: {}
    colors_dark: {}
    surfaces:
      background: ""
      foreground: ""
      header:
        background: ""
        foreground: ""
      footer:
        background: ""
        foreground: ""

  typography:
    pack: "system"

  layout:
    radius: "md"
    spacing: "spacious"
    avatar_shape: circle

  header:
    enable: true
    style: navbar
    sticky: true
    align: right
    search: true
    theme_toggle: true
    theme_picker: false
    language_switcher: false
    cta:
      enable: false
      text: ""
      url: ""

  footer:
    style: minimal
    language_switcher: false
    text: ""

  copyright:
    notice: "© {year} {name}"
    license:
      type: cc
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

  seo:
    title: ""
    location:
      address:
        street: ""
        city: "Calgary"
        region: "AB"
        postal_code: ""
        country: "Canada"
      coordinates:
        latitude: 51.0486
        longitude: -114.0708
      phone: "+1.403.708.5790"
    ai:
      allow:
        - /
      disallow: []
      note: "Guidance for AI crawlers — customize to match your public content."
      contact: "achubaty@for-cast.ca"

  content:
    math:
      enable: false
    toc:
      enable: true
    reading_time:
      enable: false
    citations:
      style: mla

  search:
    enable: true
    suggestions: []
    quick_actions: []

  comments:
    enable: true
    provider: disqus
    giscus:
      repo: ""
      repo_id: ""
      category: ""
      category_id: ""
    disqus:
      shortname: "alexmchubaty"

  analytics:
    google:
      measurement_id: "G-SBRW4YWBD0"
    google_tag_manager:
      container_id: ""
    plausible:
      domain: ""
    fathom:
      site_id: ""
    pirsch:
      site_id: ""
    clarity:
      project_id: ""
    baidu:
      site_id: ""

  verification:
    google: ""
    bing: ""
    baidu: ""
    yandex: ""
    pinterest: ""
    naver: ""

  repository:
    enable: false
    url: "https://github.com/achubaty/alexchubaty.com"
    branch: master
    content_dir: content

  locale:
    date_format: "Jan 2, 2006"
    time_format: "3:04 PM"
    address_format: en-us

  security:
    csp:
      policy: ""
      report_only: false
    frame_options: allow
    permissions_policy: ""

  privacy:
    enable: true
    anonymize_analytics: true

  debug:
    enable: false
    hud:
      position: bottom-left
      opacity: 1.0
    export_logs: true

  pro:
    hide_attribution: false
    affiliate_code: ""
